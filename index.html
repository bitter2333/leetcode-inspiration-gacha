<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>力扣灵感扭蛋机</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel" aria-labelledby="app-title">
        <div class="title-stack">
          <p class="eyebrow">LeetCode Inspiration Gacha</p>
          <h1 id="app-title">力扣灵感扭蛋机</h1>
          <p class="subtitle">选择题型与难度，转动旋钮，让今天的刷题灵感从胶囊里蹦出来。</p>
        </div>

        <div class="layout-grid">
          <section class="machine-stage" aria-label="互动扭蛋机">
            <div class="machine" id="machine">
              <div class="glass-dome">
                <div class="shine shine-left"></div>
                <div class="shine shine-right"></div>
                <div class="capsule capsule-a"><span></span></div>
                <div class="capsule capsule-b"><span></span></div>
                <div class="capsule capsule-c"><span></span></div>
                <div class="capsule capsule-d"><span></span></div>
                <div class="capsule capsule-e"><span></span></div>
                <div class="capsule capsule-f"><span></span></div>
              </div>

              <div class="machine-neck"></div>
              <div class="machine-body">
                <div class="coin-slot"></div>
                <button class="knob" id="draw-button" type="button" aria-label="抽取一道力扣题">
                  <span class="knob-ridge"></span>
                  <span class="knob-center">GO</span>
                </button>
                <div class="drop-window">
                  <div class="drop-capsule" id="drop-capsule">
                    <span class="cap-top"></span>
                    <span class="cap-bottom"></span>
                  </div>
                </div>
              </div>
              <div class="machine-base">
                <span>LUCKY BUG-FIXER</span>
              </div>
              <div class="machine-shadow"></div>
            </div>
          </section>

          <section class="control-deck" aria-label="抽题设置">
            <div class="control-block">
              <div class="section-heading">
                <span class="step-badge">01</span>
                <h2>题目类型</h2>
              </div>
              <div class="chip-grid" id="category-options" aria-label="选择一个或多个题目类型"></div>
            </div>

            <div class="control-block">
              <div class="section-heading">
                <span class="step-badge">02</span>
                <h2>难度</h2>
              </div>
              <div class="difficulty-row" id="difficulty-options" aria-label="选择题目难度"></div>
            </div>

            <div class="control-block">
              <div class="section-heading">
                <span class="step-badge">03</span>
                <h2>抽取数量</h2>
              </div>
              <div class="draw-count-row" id="draw-count-options"></div>
            </div>

            <div class="hint-strip" id="status-text" aria-live="polite">
              <span id="status-label">已装填 6 类题库，准备抽题。</span>
              <button class="mute-btn" id="mute-btn" type="button" aria-label="切换音效" title="音效开关">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
              </button>
            </div>

            <article class="result-card is-empty" id="result-card" aria-live="polite">
              <div class="result-items" id="result-items"></div>
              <div class="result-meta">
                <span id="result-category">等待抽取</span>
                <span id="result-difficulty">Ready</span>
              </div>
              <h2 id="result-title">转动旋钮，抽一颗灵感胶囊</h2>
              <p id="result-hint">你可以多选题型，再指定难度。第一版使用本地内置题库数据。</p>
              <a class="problem-link is-disabled" id="problem-link" href="#" target="_blank" rel="noreferrer">
                打开题目
              </a>
            </article>
          </section>
        </div>
      </section>
    </main>

    <canvas id="confetti-canvas"></canvas>
    <script src="./data/problems.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
